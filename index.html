<!DOCTYPE html>
<html>
<head>
  <title>blade bird</title>

  <!-- Soft Tumblr fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;

      /* soft blue Tumblr base */
      background: radial-gradient(circle at center, #2a2f4a, #0b0d14);

      color: #e7e7ff;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    /* fade in */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* slow floating text */
    .container {
      animation: float 6s ease-in-out infinite;
      z-index: 2;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 3.2rem;
      letter-spacing: 2px;
      margin: 0;

      color: #f0f0ff;
      text-shadow: 0 0 10px rgba(180,180,255,0.25);
    }

    p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 3px;
      opacity: 0.6;
      margin-top: 10px;
    }

    /* IMAGE FRAME EDGES */
    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;

      /* soft edge fade */
      filter: blur(2px) brightness(0.8) saturate(0.8);
      mask-image: radial-gradient(circle at center, transparent 35%, black 70%);
    }

    /* subtle grain overlay (tumblr feel) */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
    }
  </style>
</head>

<body onclick="nextPage()">

  <!-- edge image -->
  <div class="frame">
    <img src="your-image.jpg" alt="">
  </div>

  <!-- text -->
  <div class="container">
    <h1>blade bird</h1>
    <p>by oklou</p>
  </div>

  <!-- grain -->
  <div class="grain"></div>

  <script>
    function nextPage() {
      document.body.style.opacity = 0;
      setTimeout(() => {
        window.location.href = "1.html";
      }, 600);
    }
  </script>

</body>
</html>
