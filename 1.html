<!DOCTYPE html>
<html>
<head>
  <title>blade bird</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;

      background: radial-gradient(circle at center, #f5f5f5, #0a0a0a);

      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* glowing birds image */
    .birds {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;

      opacity: 0.22;
      filter: blur(1.5px) brightness(1.2) contrast(0.9);
      mix-blend-mode: screen;

      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: scale(1) translateY(0px); }
      50% { transform: scale(1.03) translateY(-6px); }
    }

    /* soft vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.35));
      pointer-events: none;
    }

    /* grain */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.06;
      pointer-events: none;
    }

    .container {
      z-index: 2;
      animation: floatText 6s ease-in-out infinite;
      max-width: 80%;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 1px;
      margin: 0;

      color: #111;
      opacity: 0.85;

      text-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    p {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-top: 14px;

      color: #222;
      opacity: 0.6;
    }
  </style>
</head>

<body onclick="nextPage()">

  <!-- glowing bird image -->
  <img class="birds" src="birds.jpg" alt="">

  <div class="container">
    <h1>i’ve come to terms, my baby is a bird</h1>
    <p></p>
  </div>

  <script>
    function nextPage() {
      document.body.style.opacity = 0;
      setTimeout(() => {
        window.location.href = "page2.html";
      }, 600);
    }
  </script>

</body>
</html>
