<!DOCTYPE html>
<html>
<head>
  <title>blade bird</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;

      background: radial-gradient(circle at center, #f5f5f5, #0a0a0a);

      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      max-width: 90%;
    }

    .image-side {
      width: 300px;
      height: 400px;
      overflow: hidden;
      border-radius: 4px;
      opacity: 0.8;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(1.5px) brightness(1.1);
    }

    .text-side {
      max-width: 300px;
      animation: floatText 6s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.6rem;
      letter-spacing: 1px;
      margin: 0;
      color: #111;
      opacity: 0.85;
      line-height: 1.4;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
    }

    .grain {
      position: fixed;
      inset: 0;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
      pointer-events: none;
    }
  </style>
</head>

<body onclick="nextPage()">

  <div class="wrapper">
    <div class="image-side">
      <img src="angel.jpg" alt="">
    </div>

    <div class="text-side">
      <h1>when you're in the sky,<br>i'm hoping you'll return</h1>
    </div>
  </div>

  <div class="grain"></div>

  <script>
    function nextPage() {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "page3.html";
      }, 600);
    }
  </script>

</body>
</html>
