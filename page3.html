<!DOCTYPE html>
<html>
<head>
  <title>blade bird</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: radial-gradient(circle at center, #f5f5f5, #0a0a0a);
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .container {
      text-align: center;
      max-width: 80%;
    }

    img {
      width: 200px;
      margin-bottom: 20px;
      opacity: 0.8;
      filter: blur(1px);
      pointer-events: none;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.8rem;
      color: #111;
      opacity: 0.85;
    }
  </style>
</head>

<body onclick="nextPage()">

  <div class="container">
    <img src="angel.jpg" alt="">
    <h1>when you're in the sky, i'm hoping you'll return</h1>
  </div>

  <script>
    function nextPage() {
      document.body.style.opacity = "0";
      setTimeout(function () {
        window.location.href = "page3.html";
      }, 600);
    }
  </script>

</body>
</html>
