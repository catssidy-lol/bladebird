<!DOCTYPE html>
<html>
<head>
  <title>blade bird</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      position: relative;

      background: radial-gradient(circle at center, #f5f5f5, #0a0a0a);

      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .angel {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;

      z-index: 1;
      pointer-events: none;

      opacity: 0.14;
      filter: blur(2.5px) brightness(1.1) contrast(0.9);
      mix-blend-mode: screen;

      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: scale(1) translateY(0px); }
      50% { transform: scale(1.03) translateY(-6px); }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.35));
      pointer-events: none;
      z-index: 1;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.06;
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      animation: floatText 6s ease-in-out infinite;
      max-width: 80%;
      padding: 1rem;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.9rem;
      letter-spacing: 1px;
      margin: 0;
      color: #111;
      opacity: 0.85;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <img class="angel" src="angel.jpg" alt="">

  <div class="container">
    <h1>when you're in the sky, i'm hoping you'll return</h1>
  </div>

  <script>
    document.addEventListener("click", function () {
      document.body.style.opacity = "0";
      setTimeout(function () {
        window.location.href = "page3.html";
      }, 600);
    });
  </script>
</body>
</html>
