<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blade bird</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      position: relative;

      background: radial-gradient(circle at center, #2a2f4a, #0b0d14);
      color: #e7e7ff;

      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .frame {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.22;
    }

    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(2px) brightness(0.8) saturate(0.8);
      mask-image: radial-gradient(circle at center, transparent 35%, black 70%);
      -webkit-mask-image: radial-gradient(circle at center, transparent 35%, black 70%);
    }

    .container {
      animation: float 6s ease-in-out infinite;
      z-index: 2;
      max-width: 75%;
      padding: 1rem;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin: 0;
      line-height: 1.35;
      color: #f0f0ff;
      text-shadow: 0 0 10px rgba(180,180,255,0.2);
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
    }
  </style>
</head>

<body onclick="nextPage()">

  <div class="frame">
    <img src="angel.jpg" alt="">
  </div>

  <div class="container">
    <h1>when you're in the sky,<br>i'm hoping you'll return</h1>
  </div>

  <div class="grain"></div>

  <script>
    function nextPage() {
      document.body.style.opacity = "0";
      setTimeout(function () {
        window.location.href = "page3.html";
      }, 600);
    }
  </script>

</body>
</html>
