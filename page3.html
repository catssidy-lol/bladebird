<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>blade bird</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: radial-gradient(circle at center, #111, #000);
      color: white;
      opacity: 0;
      animation: fadeIn 1.4s ease forwards;
      transition: opacity 0.6s ease;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .angel {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.18;
      filter: blur(2px) brightness(1.05) contrast(0.95);
      mix-blend-mode: screen;
      animation: drift 9s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes drift {
      0%, 100% { transform: scale(1) translateY(0px); }
      50% { transform: scale(1.02) translateY(-6px); }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.05;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4));
      pointer-events: none;
    }

    .container {
      z-index: 2;
      max-width: 70%;
      padding: 1rem;
      animation: floatText 7s ease-in-out infinite;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.8rem;
      letter-spacing: 1px;
      margin: 0;
      opacity: 0.85;
      text-shadow: 0 0 14px rgba(255,255,255,0.15);
      line-height: 1.4;
    }
  </style>
</head>

<body onclick="nextPage()">
  <img class="angel" src="angel.jpg" alt="angel background">

  <div class="container">
    <h1>when you're in the sky,<br>i'm hoping you'll return</h1>
  </div>

  <script>
    function nextPage() {
      document.body.style.opacity = "0";
      setTimeout(() => {
        window.location.href = "page3.html";
      }, 600);
    }
  </script>
</body>
</html>
